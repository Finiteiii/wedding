<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>备婚进度管理 · 十一月初九 · 2026.12.17</title>
<style>
  :root {
    --bg: #faf9f7;
    --card: #ffffff;
    --border: #e8e4df;
    --text: #2c2520;
    --text2: #7a7067;
    --accent: #c8553d;
    --accent-light: #f5e6e2;
    --green: #5a8a5e;
    --green-light: #e4f0e5;
    --blue: #4a7c9b;
    --blue-light: #e1eef5;
    --yellow: #b08d3e;
    --yellow-light: #f5edd8;
    --purple: #7b6b8d;
    --purple-light: #ede9f2;
    --teal: #3a8a7a;
    --teal-light: #e0f2ee;
    --radius: 12px;
    --shadow: 0 2px 12px rgba(44,37,32,0.06);
    --shadow-lg: 0 8px 32px rgba(44,37,32,0.1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }

  .header {
    background: linear-gradient(135deg, #2c2520 0%, #5a4a3f 100%);
    color: white;
    padding: 28px 24px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(44,37,32,0.15);
  }
  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    max-width: 1200px;
    margin: 0 auto;
  }
  .header h1 { font-size: 22px; font-weight: 700; letter-spacing: 1px; }
  .header h1 .hl { color: #f0c9a0; }
  .countdown {
    background: rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 8px 20px;
    font-size: 14px;
    backdrop-filter: blur(4px);
    white-space: nowrap;
  }
  .countdown strong { font-size: 22px; color: #f0c9a0; }
  .progress-bar-wrap {
    max-width: 1200px;
    margin: 14px auto 0;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .progress-bar-wrap label { font-size: 12px; color: rgba(255,255,255,0.7); white-space: nowrap; }
  .progress-bar { flex: 1; height: 6px; background: rgba(255,255,255,0.15); border-radius: 3px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, #f0c9a0, #c8553d); border-radius: 3px; transition: width 0.6s ease; }
  .progress-bar-wrap .pct { font-size: 13px; color: #f0c9a0; font-weight: 600; min-width: 40px; text-align: right; }
  .header-sub {
    max-width: 1200px;
    margin: 10px auto 0;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    font-size: 12px;
    color: rgba(255,255,255,0.55);
  }
  .header-sub span { white-space: nowrap; }

  .tabs {
    max-width: 1200px;
    margin: 0 auto;
    padding: 12px 24px 0;
    display: flex;
    gap: 4px;
    border-bottom: 2px solid var(--border);
    overflow-x: auto;
  }
  .tab {
    padding: 10px 18px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text2);
    cursor: pointer;
    border: none;
    background: none;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }

  .main { max-width: 1200px; margin: 0 auto; padding: 20px 24px; }
  .panel { display: none; }
  .panel.active { display: block; }

  .section-title {
    font-size: 16px;
    font-weight: 700;
    margin: 24px 0 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title:first-child { margin-top: 0; }

  .overview-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }
  .overview-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 16px;
    box-shadow: var(--shadow);
    border-left: 4px solid var(--accent);
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .overview-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
  .overview-card .oc-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .overview-card .oc-title { font-size: 14px; font-weight: 600; }
  .overview-card .oc-count { font-size: 12px; color: var(--text2); margin-bottom: 6px; }
  .overview-card .oc-progress { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .overview-card .oc-progress-fill { height: 100%; border-radius: 2px; transition: width 0.4s; }

  .budget-card {
    background: linear-gradient(135deg, #2c2520 0%, #5a4a3f 100%);
    border-radius: var(--radius);
    padding: 20px;
    color: white;
    margin-bottom: 20px;
  }
  .budget-card .bc-title { font-size: 14px; color: rgba(255,255,255,0.7); margin-bottom: 8px; }
  .budget-card .bc-amount { font-size: 28px; font-weight: 700; color: #f0c9a0; }
  .budget-card .bc-amount small { font-size: 14px; font-weight: 400; color: rgba(255,255,255,0.5); }
  .budget-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; margin-top: 12px; }
  .budget-item { background: rgba(255,255,255,0.08); border-radius: 8px; padding: 8px 12px; font-size: 12px; }
  .budget-item .bi-label { color: rgba(255,255,255,0.6); }
  .budget-item .bi-value { color: #f0c9a0; font-weight: 600; }

  .budget-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
  .budget-stat { background: var(--card); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); text-align: center; }
  .budget-stat .bs-icon { font-size: 18px; margin-bottom: 2px; }
  .budget-stat .bs-label { font-size: 12px; color: var(--text2); margin-bottom: 2px; }
  .budget-stat .bs-value { font-size: 20px; font-weight: 700; }
  .budget-stat .bs-value.clr-green { color: var(--green); }
  .budget-stat .bs-value.clr-accent { color: var(--accent); }
  .budget-stat .bs-value.clr-blue { color: var(--blue); }
  .budget-bar-wrap { margin-bottom: 24px; }
  .budget-bar { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .budget-bar-fill { height: 100%; background: linear-gradient(90deg, var(--green), #8bc34a); border-radius: 4px; transition: width 0.6s; }
  .budget-bar-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--text2); margin-top: 4px; }
  .pay-section-title { font-size: 14px; font-weight: 600; margin: 24px 0 12px; display: flex; align-items: center; gap: 6px; }
  .pay-card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 12px; overflow: hidden; }
  .pay-card-head { padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; }
  .pay-card-head:hover { background: rgba(0,0,0,0.015); }
  .pay-card-head .pch-left { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
  .pay-card-head .pch-icon { font-size: 20px; flex-shrink: 0; }
  .pay-card-head .pch-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pay-card-head .pch-amount { font-size: 13px; font-weight: 600; color: var(--accent); white-space: nowrap; margin-left: 8px; }
  .pay-card-head .pch-paid { font-size: 11px; color: var(--green); white-space: nowrap; margin-left: 8px; }
  .pay-card-head .pch-toggle { font-size: 14px; color: var(--text2); margin-left: 6px; transition: transform 0.3s; }
  .pay-card-bar { height: 3px; background: var(--border); }
  .pay-card-bar-fill { height: 100%; background: var(--green); transition: width 0.4s; }
  .pay-card-body { padding: 0; }
  .pay-card-body.collapsed { display: none; }
  .pay-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .pay-table th { padding: 7px 14px; text-align: left; font-weight: 500; color: var(--text2); background: var(--bg); font-size: 11px; }
  .pay-table td { padding: 10px 14px; border-top: 1px solid var(--border); }
  .pay-table .amt { font-weight: 600; font-variant-numeric: tabular-nums; }
  .pay-table .amt-paid { color: var(--green); }
  .pay-table .amt-unpaid { color: var(--accent); }
  .pay-chip { display: inline-flex; align-items: center; gap: 2px; padding: 3px 10px; border-radius: 10px; font-size: 11px; font-weight: 500; cursor: pointer; transition: all 0.2s; user-select: none; }
  .pay-chip:hover { opacity: 0.75; }
  .pay-chip.paid { background: var(--green-light); color: var(--green); }
  .pay-chip.unpaid { background: var(--yellow-light); color: var(--yellow); }
  .pay-chip.overdue { background: var(--accent-light); color: var(--accent); }
  .pay-card-note { padding: 8px 14px; font-size: 11px; color: var(--text2); background: var(--bg); border-top: 1px solid var(--border); line-height: 1.6; }
  .pending-item { padding: 10px 14px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
  .pending-item .pi-name { display: flex; align-items: center; gap: 6px; }
  .pending-item .pi-note { font-size: 12px; color: var(--text2); }
  .budget-hint { text-align: center; font-size: 11px; color: var(--text2); margin-top: 12px; padding: 8px; }

  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; }
  .badge-pending { background: var(--yellow-light); color: var(--yellow); }
  .badge-active { background: var(--blue-light); color: var(--blue); }
  .badge-done { background: var(--green-light); color: var(--green); }
  .badge-overdue { background: var(--accent-light); color: var(--accent); }

  .vendor-section { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 16px; overflow: hidden; }
  .vendor-header {
    padding: 14px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    transition: background 0.2s;
  }
  .vendor-header:hover { background: rgba(0,0,0,0.015); }
  .vendor-header .vh-left { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
  .vendor-header .vh-icon { font-size: 24px; flex-shrink: 0; }
  .vendor-header .vh-info { min-width: 0; }
  .vendor-header .vh-title { font-size: 15px; font-weight: 600; }
  .vendor-header .vh-sub { font-size: 12px; color: var(--text2); }
  .vendor-header .vh-price { font-size: 13px; color: var(--accent); font-weight: 600; white-space: nowrap; margin-left: 8px; }
  .vendor-header .vh-toggle { font-size: 18px; color: var(--text2); transition: transform 0.3s; flex-shrink: 0; margin-left: 8px; }
  .vendor-header.open .vh-toggle { transform: rotate(180deg); }
  .vendor-body { padding: 0 18px 16px; display: none; }
  .vendor-body.open { display: block; }

  .detail-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 12px;
    color: var(--text2);
    line-height: 1.8;
    margin-bottom: 12px;
    white-space: pre-line;
  }

  .task-list { list-style: none; }
  .task-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .task-item:last-child { border-bottom: none; }
  .task-check {
    width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--border);
    cursor: pointer; flex-shrink: 0; margin-top: 2px; display: flex;
    align-items: center; justify-content: center; font-size: 11px; color: white; transition: all 0.2s;
  }
  .task-check.done { background: var(--green); border-color: var(--green); }
  .task-check:hover { border-color: var(--green); }
  .task-info { flex: 1; min-width: 0; }
  .task-title { font-size: 13px; font-weight: 500; }
  .task-title.done-text { text-decoration: line-through; color: var(--text2); }
  .task-meta { display: flex; gap: 8px; margin-top: 3px; font-size: 11px; color: var(--text2); flex-wrap: wrap; }

  .people-box { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; margin-bottom: 12px; }
  .people-box .pb-title { font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 4px; }
  .people-box .pb-list { font-size: 12px; color: var(--text); line-height: 1.8; }

  .file-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .file-chip {
    display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px;
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    font-size: 11px; color: var(--text); cursor: default;
    max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  .notes-area {
    width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px;
    font-size: 12px; font-family: inherit; resize: vertical; min-height: 50px; margin-top: 8px;
    background: var(--bg); color: var(--text);
  }
  .notes-area:focus { outline: none; border-color: var(--accent); }

  .timeline-container { position: relative; padding-left: 32px; }
  .timeline-container::before { content: ''; position: absolute; left: 11px; top: 0; bottom: 0; width: 2px; background: var(--border); }
  .timeline-month { margin-bottom: 24px; }
  .timeline-month-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 10px; position: relative; }
  .timeline-month-title::before { content: ''; position: absolute; left: -27px; top: 5px; width: 12px; height: 12px; border-radius: 50%; background: var(--accent); border: 2px solid var(--card); box-shadow: 0 0 0 2px var(--accent); }
  .timeline-event { background: var(--card); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 8px; box-shadow: var(--shadow); display: flex; justify-content: space-between; align-items: center; gap: 10px; }
  .timeline-event .te-left { flex: 1; }
  .timeline-event .te-date { font-size: 11px; color: var(--text2); }
  .timeline-event .te-title { font-size: 13px; font-weight: 500; margin-top: 1px; }
  .timeline-event .te-vendor { font-size: 11px; color: var(--text2); margin-top: 1px; }

  .files-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px; }
  .file-card { background: var(--card); border-radius: var(--radius); padding: 14px; box-shadow: var(--shadow); display: flex; align-items: flex-start; gap: 10px; transition: transform 0.2s; }
  .file-card:hover { transform: translateY(-1px); }
  .file-card .ff-icon { font-size: 28px; flex-shrink: 0; }
  .file-card .ff-info { flex: 1; min-width: 0; }
  .file-card .ff-name { font-size: 12px; font-weight: 500; word-break: break-all; }
  .file-card .ff-meta { font-size: 11px; color: var(--text2); margin-top: 3px; }
  .file-card .ff-vendor { display: inline-block; margin-top: 4px; padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: 500; }

  .btn { display: inline-flex; align-items: center; gap: 4px; padding: 7px 14px; border-radius: 8px; font-size: 12px; font-weight: 500; cursor: pointer; border: none; transition: all 0.2s; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: #b04a35; }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text2); }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
  .btn-sm { padding: 4px 10px; font-size: 11px; }

  .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--card); border-radius: 16px; width: 100%; max-width: 520px; box-shadow: var(--shadow-lg); max-height: 90vh; overflow-y: auto; }
  .modal-head { padding: 18px 22px 10px; display: flex; justify-content: space-between; align-items: center; }
  .modal-head h3 { font-size: 16px; font-weight: 600; }
  .modal-close { width: 30px; height: 30px; border-radius: 50%; border: none; background: var(--bg); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text2); }
  .modal-body { padding: 0 22px 22px; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 5px; }
  .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; font-family: inherit; color: var(--text); background: var(--bg); }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--accent); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
  .filter-chip { padding: 5px 12px; border-radius: 16px; font-size: 12px; cursor: pointer; border: 1px solid var(--border); background: var(--card); color: var(--text2); transition: all 0.2s; white-space: nowrap; }
  .filter-chip.active, .filter-chip:hover { background: var(--accent); color: white; border-color: var(--accent); }

  .empty-state { text-align: center; padding: 40px 20px; color: var(--text2); }
  .empty-state .es-icon { font-size: 40px; margin-bottom: 10px; }
  .empty-state p { font-size: 13px; }

  @media (max-width: 640px) {
    .header h1 { font-size: 16px; }
    .countdown { font-size: 12px; padding: 6px 14px; }
    .countdown strong { font-size: 18px; }
    .tabs { padding: 10px 16px 0; gap: 0; }
    .tab { padding: 8px 10px; font-size: 12px; }
    .main { padding: 14px; }
    .overview-grid { grid-template-columns: 1fr 1fr; }
    .files-grid { grid-template-columns: 1fr; }
    .budget-grid { grid-template-columns: 1fr 1fr; }
    .vendor-header .vh-price { display: none; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <h1>💍 <span class="hl">备婚进度</span> · 十一月初九</h1>
    <div class="countdown" id="countdown">距婚礼还有 <strong id="countDays">--</strong> 天</div>
  </div>
  <div class="progress-bar-wrap">
    <label>整体进度</label>
    <div class="progress-bar"><div class="progress-bar-fill" id="totalProgress" style="width:0%"></div></div>
    <span class="pct" id="totalPct">0%</span>
  </div>
  <div class="header-sub">
    <span>🗓️ 2026.12.17（农历十一月初九）</span>
    <span>🏨 南沙金茂万豪 · 户外草坪+自助午餐</span>
    <span>🍽️ 中山小榄宝珑荟 · 联姻晚宴</span>
  </div>
</div>

<div class="tabs">
  <button class="tab active" data-tab="overview">📋 总览</button>
  <button class="tab" data-tab="vendors">🤝 乙方管理</button>
  <button class="tab" data-tab="timeline">📅 时间线</button>
  <button class="tab" data-tab="files">📁 资料库</button>
  <button class="tab" data-tab="budget">💰 预算</button>
</div>

<div class="main">
  <div class="panel active" id="panel-overview">
    <div class="overview-grid" id="overviewGrid"></div>
    <div class="section-title">🔥 待办事项（未完成）</div>
    <div id="pendingTasks"></div>
  </div>
  <div class="panel" id="panel-vendors">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; flex-wrap:wrap; gap:8px;">
      <div class="filter-row" id="vendorFilter" style="margin-bottom:0;"></div>
      <button class="btn btn-primary btn-sm" onclick="openAddTaskModal()">+ 添加任务</button>
    </div>
    <div id="vendorSections"></div>
  </div>
  <div class="panel" id="panel-timeline">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
      <h3 style="font-size:15px; font-weight:600;">📅 备婚时间线</h3>
      <button class="btn btn-primary btn-sm" onclick="openAddMilestoneModal()">+ 添加里程碑</button>
    </div>
    <div class="timeline-container" id="timelineContainer"></div>
  </div>
  <div class="panel" id="panel-files">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
      <div class="filter-row" id="fileFilter" style="margin-bottom:0;"></div>
    </div>
    <div class="files-grid" id="filesGrid"></div>
  </div>
  <div class="panel" id="panel-budget">
    <div id="budgetPanel"></div>
  </div>
</div>

<div class="modal-overlay" id="addTaskModal">
  <div class="modal">
    <div class="modal-head"><h3>添加任务</h3><button class="modal-close" onclick="closeModal('addTaskModal')">✕</button></div>
    <div class="modal-body">
      <div class="form-group"><label>所属乙方</label><select id="taskVendor"></select></div>
      <div class="form-group"><label>任务名称</label><input type="text" id="taskName" placeholder="如：确认花艺方案"></div>

// ===== PERSISTENCE =====
function saveData() {
  try {
    localStorage.setItem('wedding_v2_vendors', JSON.stringify(VENDORS));
    localStorage.setItem('wedding_v2_milestones', JSON.stringify(milestones));
    localStorage.setItem('wedding_v2_payments', JSON.stringify(PAYMENTS));
  } catch(e) { console.warn('localStorage save failed'); }
}
function loadData() {
  try {
    const v = localStorage.getItem('wedding_v2_vendors');
    const m = localStorage.getItem('wedding_v2_milestones');
    const pm = localStorage.getItem('wedding_v2_payments');
    if (v) { const parsed = JSON.parse(v); VENDORS.length = 0; parsed.forEach(p => VENDORS.push(p)); }
    if (m) { milestones = JSON.parse(m); }
    if (pm) { PAYMENTS = JSON.parse(pm); }
  } catch(e) { console.warn('localStorage unavailable, using default data'); }
}

// ===== HELPERS =====
function statusBadge(s) {
  return { pending: '<span class="badge badge-pending">\u23F3 待确认</span>', active: '<span class="badge badge-active">\uD83D\uDD04 进行中</span>', done: '<span class="badge badge-done">\u2705 已完成</span>' }[s] || '';
}
function fileIcon(t) { return { pdf: '\uD83D\uDCD5', xls: '\uD83D\uDCCA', docx: '\uD83D\uDCD8', img: '\uD83D\uDDBC\uFE0F', heic: '\uD83D\uDDBC\uFE0F', jpg: '\uD83D\uDDBC\uFE0F' }[t] || '\uD83D\uDCC4'; }
function daysUntil(d) { if (!d) return null; const t = new Date(d), n = new Date(); n.setHours(0,0,0,0); t.setHours(0,0,0,0); return Math.ceil((t-n)/86400000); }
function formatDate(d) { if (!d) return ''; const t = new Date(d); return t.getFullYear()+'.'+String(t.getMonth()+1).padStart(2,'0')+'.'+String(t.getDate()).padStart(2,'0'); }
function getVendorName(id) { const v = VENDORS.find(x => x.id === id); return v ? v.name : ''; }
function getAllTasks() { const t = []; VENDORS.forEach(v => v.tasks.forEach(x => t.push({...x, vendorId:v.id, vendorName:v.name, vendorIcon:v.icon, vendorColor:v.color}))); return t; }
function generateId() { return 'id_'+Date.now()+'_'+Math.random().toString(36).substr(2,6); }
function calcBudget() { let total=0; const items=[]; VENDORS.forEach(v => { if (v.price && v.price!=='--') { const n=parseFloat(v.price.replace(/[\u00A5,]/g,'')); if (!isNaN(n)) { total+=n; items.push({name:v.name,icon:v.icon,price:n,color:v.color}); } } }); return {total,items}; }

// ===== RENDER =====
function render() { renderCountdown(); renderOverview(); renderVendors(); renderTimeline(); renderFiles(); renderBudget(); renderVendorSelects(); updateProgress(); }
function renderCountdown() { const d = Math.ceil((WEDDING_DATE-new Date())/86400000); document.getElementById('countDays').textContent = d>0?d:0; }
function updateProgress() { const a=getAllTasks(), d=a.filter(t=>t.status==='done').length, t=a.length, p=t>0?Math.round(d/t*100):0; document.getElementById('totalProgress').style.width=p+'%'; document.getElementById('totalPct').textContent=p+'%'; }

function renderOverview() {
  const grid = document.getElementById('overviewGrid');
  grid.innerHTML = '';
  VENDORS.forEach(v => {
    if (!v.tasks.length && !v.files.length) return;
    const total=v.tasks.length, done=v.tasks.filter(t=>t.status==='done').length, pct=total>0?Math.round(done/total*100):0;
    const card = document.createElement('div');
    card.className = 'overview-card'; card.style.borderLeftColor = v.color;
    card.onclick = () => { switchTab('vendors'); filterVendor(v.id); };
    card.innerHTML = `<div class="oc-header"><div class="oc-title">${v.icon} ${v.name}</div>${statusBadge(done===total&&total>0?'done':done>0?'active':'pending')}</div><div class="oc-count">${done}/${total} 完成${v.price&&v.price!=='--'?' \u00B7 '+v.price:''}</div><div class="oc-progress"><div class="oc-progress-fill" style="width:${pct}%;background:${v.color}"></div></div>`;
    grid.appendChild(card);
  });
  const pending = document.getElementById('pendingTasks');
  const notDone = getAllTasks().filter(t=>t.status!=='done').sort((a,b)=>{if(!a.due)return 1;if(!b.due)return-1;return new Date(a.due)-new Date(b.due)});
  if (!notDone.length) { pending.innerHTML='<div class="empty-state"><div class="es-icon">\uD83C\uDF89</div><p>所有任务已完成！</p></div>'; return; }
  pending.innerHTML = notDone.map(t => {
    const days=daysUntil(t.due); let info='';
    if(days!==null){if(days<0)info=`<span style="color:var(--accent);font-size:11px">已逾期${Math.abs(days)}天</span>`;else if(days<=14)info=`<span style="color:var(--yellow);font-size:11px">还剩${days}天</span>`;else info=`<span style="font-size:11px">还剩${days}天</span>`;}
    return `<div class="timeline-event"><div class="te-left"><div class="te-title">${t.vendorIcon} ${t.title}</div><div class="te-vendor">${t.vendorName}${t.due?' \u00B7 '+formatDate(t.due):''} ${info}</div></div>${statusBadge(t.status)}</div>`;
  }).join('');
}

function renderVendors() {
  const container = document.getElementById('vendorSections'); container.innerHTML = '';
  const filterDiv = document.getElementById('vendorFilter');
  filterDiv.innerHTML = `<button class="filter-chip active" onclick="filterVendor('all')">全部</button>` + VENDORS.filter(v=>v.tasks.length||v.files.length).map(v=>`<button class="filter-chip" data-vendor="${v.id}" onclick="filterVendor('${v.id}')">${v.icon} ${v.name.replace(/（.*?）/g,'')}</button>`).join('');
  VENDORS.forEach(v => {
    if(!v.tasks.length&&!v.files.length) return;
    const section=document.createElement('div'); section.className='vendor-section'; section.dataset.vendor=v.id;
    const total=v.tasks.length, done=v.tasks.filter(t=>t.status==='done').length;
    let headerExtra = v.price&&v.price!=='--'?`<span class="vh-price">${v.price}</span>`:'';
    let peopleHtml = v.people ? Object.entries(v.people).map(([k,val])=>`<div class="people-box"><div class="pb-title">${k}</div><div class="pb-list">${val}</div></div>`).join('') : '';
    let detailHtml = v.detail ? `<div class="detail-box">${v.detail}</div>` : '';
    let priceHtml = v.priceDetail ? `<div class="detail-box">\uD83D\uDCB0 ${v.priceDetail}</div>` : '';
    section.innerHTML = `<div class="vendor-header open" onclick="toggleVendor(this)" style="border-left:4px solid ${v.color}"><div class="vh-left"><div class="vh-icon">${v.icon}</div><div class="vh-info"><div class="vh-title">${v.name}</div><div class="vh-sub">${total>0?done+'/'+total+' 完成':''}${v.files.length?' \u00B7 '+v.files.length+' 份资料':''}</div></div></div>${headerExtra}<div class="vh-toggle">\u25BC</div></div><div class="vendor-body open">${priceHtml}${detailHtml}${peopleHtml}${v.tasks.length?`<ul class="task-list">${v.tasks.map(t=>`<li class="task-item" data-task-id="${t.id}"><div class="task-check ${t.status==='done'?'done':''}" onclick="toggleTask('${v.id}','${t.id}')">${t.status==='done'?'\u2713':''}</div><div class="task-info"><div class="task-title ${t.status==='done'?'done-text':''}">${t.title}</div><div class="task-meta">${t.due?`<span>\uD83D\uDCC5 ${formatDate(t.due)}</span>`:''}${statusBadge(t.status)}</div>${t.notes?`<div style="font-size:11px;color:var(--text2);margin-top:2px;">${t.notes}</div>`:''}</div><button class="btn btn-outline btn-sm" onclick="deleteTask('${v.id}','${t.id}')" style="padding:2px 6px;font-size:10px;">\uD83D\uDDD1</button></li>`).join('')}</ul>`:''}${v.files.length?`<div style="margin-top:12px;font-size:12px;font-weight:500;color:var(--text2);">\uD83D\uDCCE 相关资料</div><div class="file-list">${v.files.map(f=>`<div class="file-chip"><span>${fileIcon(f.type)}</span><span>${f.name}</span></div>`).join('')}</div>`:''}<textarea class="notes-area" placeholder="备忘/对接记录..." oninput="saveVendorNotes('${v.id}',this.value)" data-vendor-notes="${v.id}">${v.notes||''}</textarea></div>`;
    container.appendChild(section);
  });
}

function renderTimeline() {
  const container=document.getElementById('timelineContainer');
  const sorted=[...milestones].sort((a,b)=>new Date(a.date)-new Date(b.date));
  const months={};
  sorted.forEach(m=>{const d=new Date(m.date),k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'),l=d.getFullYear()+'年'+(d.getMonth()+1)+'月';if(!months[k])months[k]={label:l,events:[]};months[k].events.push(m);});
  container.innerHTML=Object.entries(months).map(([k,month])=>`<div class="timeline-month"><div class="timeline-month-title">${month.label}</div>${month.events.map(e=>{const vn=e.vendor?getVendorName(e.vendor):'',days=daysUntil(e.date);let tag='';if(e.status!=='done'){if(days!==null&&days<0)tag='<span class="badge badge-overdue" style="margin-left:6px">已逾期</span>';else if(days!==null&&days<=30)tag='<span class="badge badge-active" style="margin-left:6px">还剩'+days+'天</span>';}return `<div class="timeline-event"><div class="te-left"><div class="te-date">${formatDate(e.date)}</div><div class="te-title">${e.title} ${tag}</div>${vn?`<div class="te-vendor">${vn}</div>`:''}</div>${statusBadge(e.status)}</div>`;}).join('')}</div>`).join('');
}

function renderFiles() {
  const grid=document.getElementById('filesGrid');
  const types=[...new Set(VENDORS.flatMap(v=>v.files.map(f=>f.type)))];
  document.getElementById('fileFilter').innerHTML=`<button class="filter-chip active" onclick="filterFiles('all')">全部</button>`+types.map(t=>`<button class="filter-chip" data-filetype="${t}" onclick="filterFiles('${t}')">${fileIcon(t)} ${t.toUpperCase()}</button>`).join('');
  const allFiles=[]; VENDORS.forEach(v=>v.files.forEach(f=>allFiles.push({...f,vendorId:v.id,vendorName:v.name,vendorColor:v.color,vendorIcon:v.icon})));
  grid.innerHTML=allFiles.map(f=>`<div class="file-card" data-filetype="${f.type}"><div class="ff-icon">${fileIcon(f.type)}</div><div class="ff-info"><div class="ff-name">${f.name}</div><div class="ff-meta">${f.size}</div><span class="ff-vendor" style="background:${f.vendorColor}20;color:${f.vendorColor}">${f.vendorIcon} ${f.vendorName}</span></div></div>`).join('');
}

function renderBudget() {
  var totalBudget = 0, totalPaid = 0, totalUnpaid = 0;
  var vendorPayments = [];

  VENDORS.forEach(function(v) {
    var schedule = PAYMENTS[v.id];
    if (!schedule || !schedule.length) return;
    var vTotal = 0, vPaid = 0;
    schedule.forEach(function(p) { vTotal += p.amount; if (p.paid) vPaid += p.amount; });
    totalBudget += vTotal;
    totalPaid += vPaid;
    totalUnpaid += (vTotal - vPaid);
    vendorPayments.push({ vendor: v, schedule: schedule, total: vTotal, paid: vPaid, unpaid: vTotal - vPaid });
  });

  var paidPct = totalBudget > 0 ? Math.round(totalPaid / totalBudget * 100) : 0;

  var pendingVendors = VENDORS.filter(function(v) {
    return (!PAYMENTS[v.id] || !PAYMENTS[v.id].length) && v.id !== 'uncategorized';
  });

  var html = '';

  // ===== Summary stats =====
  html += '<div class="budget-stats">';
  html += '<div class="budget-stat"><div class="bs-icon">💰</div><div class="bs-label">已确认预算</div><div class="bs-value clr-blue">¥' + totalBudget.toLocaleString() + '</div></div>';
  html += '<div class="budget-stat"><div class="bs-icon">✅</div><div class="bs-label">已支付</div><div class="bs-value clr-green">¥' + totalPaid.toLocaleString() + '</div></div>';
  html += '<div class="budget-stat"><div class="bs-icon">⏳</div><div class="bs-label">待支付</div><div class="bs-value clr-accent">¥' + totalUnpaid.toLocaleString() + '</div></div>';
  html += '</div>';

  // ===== Progress bar =====
  html += '<div class="budget-bar-wrap"><div class="budget-bar"><div class="budget-bar-fill" style="width:' + paidPct + '%"></div></div><div class="budget-bar-labels"><span>已付 ' + paidPct + '%</span><span>¥' + totalPaid.toLocaleString() + ' / ¥' + totalBudget.toLocaleString() + '</span></div></div>';

  // ===== Payment detail cards =====
  html += '<div class="pay-section-title">📋 分项目付款明细</div>';

  vendorPayments.forEach(function(vp) {
    var v = vp.vendor;
    var pctV = vp.total > 0 ? Math.round(vp.paid / vp.total * 100) : 0;

    html += '<div class="pay-card">';
    html += '<div class="pay-card-head" onclick="togglePayCard(this)">';
    html += '<div class="pch-left"><span class="pch-icon">' + v.icon + '</span><span class="pch-name">' + v.name.replace(/（.*?）/g,'') + '</span></div>';
    if (vp.paid > 0) html += '<span class="pch-paid">已付¥' + vp.paid.toLocaleString() + '</span>';
    html += '<span class="pch-amount">¥' + vp.total.toLocaleString() + '</span>';
    html += '<span class="pch-toggle">▼</span>';
    html += '</div>';
    html += '<div class="pay-card-bar"><div class="pay-card-bar-fill" style="width:' + pctV + '%"></div></div>';
    html += '<div class="pay-card-body">';
    html += '<table class="pay-table"><thead><tr><th>阶段</th><th>金额</th><th>截止日期</th><th>状态</th></tr></thead><tbody>';

    vp.schedule.forEach(function(p, idx) {
      var days = daysUntil(p.dueDate);
      var statusClass = p.paid ? 'paid' : (days !== null && days < 0 ? 'overdue' : 'unpaid');
      var statusText = p.paid ? '✓ 已付' : (days !== null && days < 0 ? '⚠ 逾期' : '待支付');
      var dueDisplay = p.dueDate ? formatDate(p.dueDate) : '--';
      if (!p.paid && days !== null && days >= 0 && days <= 30) {
        dueDisplay += '<br><span style="font-size:10px;color:var(--yellow)">还剩' + days + '天</span>';
      } else if (!p.paid && days !== null && days < 0) {
        dueDisplay += '<br><span style="font-size:10px;color:var(--accent)">逾期' + Math.abs(days) + '天</span>';
      }
      html += '<tr>';
      html += '<td>' + p.label + '</td>';
      html += '<td class="amt ' + (p.paid ? 'amt-paid' : 'amt-unpaid') + '">¥' + p.amount.toLocaleString() + '</td>';
      html += '<td>' + dueDisplay + '</td>';
      html += '<td><span class="pay-chip ' + statusClass + '" onclick="event.stopPropagation();togglePayment(\'' + v.id + '\',' + idx + ')">' + statusText + '</span></td>';
      html += '</tr>';
    });

    html += '</tbody></table>';

    var hasNotes = vp.schedule.some(function(p) { return p.note; });
    if (hasNotes) {
      html += '<div class="pay-card-note">';
      vp.schedule.forEach(function(p) {
        if (p.note) html += '<b>' + p.label + '</b>：' + p.note + '<br>';
      });
      html += '</div>';
    }

    html += '</div></div>';
  });

  // ===== Pending vendors =====
  if (pendingVendors.length > 0) {
    html += '<div class="pay-section-title">⚠️ 待确认费用</div>';
    html += '<div class="pay-card"><div class="pay-card-body">';
    pendingVendors.forEach(function(v, idx) {
      var noteText = v.priceDetail ? v.priceDetail.split('\n')[0] : '费用待确认';
      html += '<div class="pending-item"' + (idx === 0 ? ' style="border-top:none"' : '') + '>';
      html += '<span class="pi-name">' + v.icon + ' ' + v.name.replace(/（.*?）/g,'') + '</span>';
      html += '<span class="pi-note">' + noteText + '</span>';
      html += '</div>';
    });
    html += '</div></div>';
  }

  // ===== Extra notes =====
  html += '<div class="pay-card" style="margin-top:16px"><div class="pay-card-body"><div class="pay-card-note" style="line-height:2">';
  html += '<b>额外待确认费用</b><br>';
  html += '· 婚策工作人员餐费（30/餐×3餐×人数）<br>';
  html += '· 婚纱/礼服/新郎礼服/兄弟团/姐妹团服饰费用<br>';
  html += '· 喜糖、请柬等<br>';
  html += '· 领证跟拍费用<br>';
  html += '· 戶外物料/互动环节自备部分<br>';
  html += '</div></div></div>';

  html += '<div class="budget-hint">💡 点击「待支付」可切换为「已付」状态，点击卡片标题可折叠</div>';

  document.getElementById('budgetPanel').innerHTML = html;
}

function togglePayment(vendorId, scheduleIdx) {
  if (!PAYMENTS[vendorId] || !PAYMENTS[vendorId][scheduleIdx]) return;
  PAYMENTS[vendorId][scheduleIdx].paid = !PAYMENTS[vendorId][scheduleIdx].paid;
  saveData();
  renderBudget();
}

function togglePayCard(el) {
  var body = el.parentElement.querySelector('.pay-card-body');
  var toggle = el.querySelector('.pch-toggle');
  if (body.classList.contains('collapsed')) {
    body.classList.remove('collapsed');
    toggle.textContent = '▼';
  } else {
    body.classList.add('collapsed');
    toggle.textContent = '▶';
  }
}

function renderVendorSelects() {
  const opts=VENDORS.filter(v=>v.tasks.length||v.id!=='uncategorized').map(v=>`<option value="${v.id}">${v.icon} ${v.name}</option>`).join('');
  document.getElementById('taskVendor').innerHTML=opts;
  document.getElementById('milestoneVendor').innerHTML=`<option value="">无</option>`+opts;
}

// ===== ACTIONS =====
function switchTab(id) { document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active')); document.querySelector(`.tab[data-tab="${id}"]`).classList.add('active'); document.getElementById(`panel-${id}`).classList.add('active'); }
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>switchTab(t.dataset.tab)));
function toggleVendor(el) { el.classList.toggle('open'); el.nextElementSibling.classList.toggle('open'); }
function toggleTask(vid,tid) { const v=VENDORS.find(x=>x.id===vid),t=v.tasks.find(x=>x.id===tid); t.status=t.status==='done'?'pending':'done'; saveData(); render(); }
function deleteTask(vid,tid) { if(!confirm('确定删除此任务？'))return; const v=VENDORS.find(x=>x.id===vid); v.tasks=v.tasks.filter(x=>x.id!==tid); saveData(); render(); }
function saveVendorNotes(vid,val) { VENDORS.find(x=>x.id===vid).notes=val; saveData(); }
function filterVendor(id) { document.querySelectorAll('#vendorFilter .filter-chip').forEach(c=>c.classList.remove('active')); if(id==='all'){document.querySelector('#vendorFilter .filter-chip').classList.add('active');document.querySelectorAll('.vendor-section').forEach(s=>s.style.display='');}else{document.querySelector(`#vendorFilter .filter-chip[data-vendor="${id}"]`).classList.add('active');document.querySelectorAll('.vendor-section').forEach(s=>s.style.display=s.dataset.vendor===id?'':'none');} }
function filterFiles(type) { document.querySelectorAll('#fileFilter .filter-chip').forEach(c=>c.classList.remove('active')); if(type==='all'){document.querySelector('#fileFilter .filter-chip').classList.add('active');document.querySelectorAll('.file-card').forEach(c=>c.style.display='');}else{document.querySelector(`#fileFilter .filter-chip[data-filetype="${type}"]`).classList.add('active');document.querySelectorAll('.file-card').forEach(c=>c.style.display=c.dataset.filetype===type?'':'none');} }
function openAddTaskModal() { document.getElementById('addTaskModal').classList.add('open'); document.getElementById('taskName').value=''; document.getElementById('taskDue').value=''; document.getElementById('taskStatus').value='pending'; }
function openAddMilestoneModal() { document.getElementById('addMilestoneModal').classList.add('open'); document.getElementById('milestoneName').value=''; document.getElementById('milestoneDate').value=''; document.getElementById('milestoneStatus').value='pending'; }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function addTask() { const vid=document.getElementById('taskVendor').value,nm=document.getElementById('taskName').value.trim(),du=document.getElementById('taskDue').value,st=document.getElementById('taskStatus').value; if(!nm){alert('请输入任务名称');return;} VENDORS.find(x=>x.id===vid).tasks.push({id:generateId(),title:nm,status:st,due:du||'',notes:''}); saveData(); closeModal('addTaskModal'); render(); }
function addMilestone() { const nm=document.getElementById('milestoneName').value.trim(),dt=document.getElementById('milestoneDate').value,vn=document.getElementById('milestoneVendor').value,st=document.getElementById('milestoneStatus').value; if(!nm||!dt){alert('请填写名称和日期');return;} milestones.push({id:generateId(),title:nm,date:dt,vendor:vn,status:st}); milestones.sort((a,b)=>new Date(a.date)-new Date(b.date)); saveData(); closeModal('addMilestoneModal'); render(); }
document.querySelectorAll('.modal-overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');}));

document.addEventListener('DOMContentLoaded', function() {
  try { loadData(); render(); } catch(e) {
    console.error('Init error:', e);
    document.body.insertAdjacentHTML('afterbegin', '<div style="padding:20px;background:#fff3f3;color:#c8553d;font-size:14px;">页面加载出错：'+e.message+'</div>');
  }
});
</script>
